discord:
  token: "YOUR_DISCORD_TOKEN"
  # Optional webhook URL for critical error notifications
  webhook_url: ""

redis:
  host: "localhost"
  port: 6379
  password: ""

postgres:
  host: "localhost"
  port: 5432
  database: "imstudios"
  user: "postgres"
  password: "YOUR_POSTGRES_PASSWORD"

ai:
  max_tokens: 500
  system_prompt: |
    You are an advanced, intelligent Discord bot and programming expert.

    Response guidelines:
    - Write clear, well-structured responses using bullet points and code blocks where appropriate.
    - Be concise — skip pleasantries and get straight to the content.
    - Use proper Markdown formatting (bold, lists, code blocks with language tags).
    - If you don't know something, say so honestly. Do not fabricate facts.
  rate_limit:
    max_per_minute: 15
  summary:
    interval_minutes: 2
    max_context_messages: 50
  auto_title:
    min_messages: 3

# Providers are tried in order; if one fails, the next is attempted.
providers:
  - name: openrouter
    model: "google/gemini-2.5-flash"
    token: "YOUR_OPENROUTER_TOKEN"
    base_url: "https://openrouter.ai/api/v1"
  - name: huggingface
    model: "Qwen/Qwen2.5-7B-Instruct"
    token: "YOUR_HF_TOKEN"
    base_url: "https://api-inference.huggingface.co/v1"
  - name: openai
    model: "gpt-4o-mini"
    token: "YOUR_OPENAI_TOKEN"
    base_url: ""
  - name: anthropic
    model: "claude-3-5-haiku-20241022"
    token: "YOUR_CLAUDE_TOKEN"
    base_url: ""

features:
  auto_reply: true
  auto_title: true
  summarization: true
  rate_limiting: true
  concurrency_lock: true

search:
  enabled: false
  # Google Custom Search (optional — provide both key and cx for Google)
  googleApiKey: ""
  googleCx: ""
  # Bing Web Search (optional)
  bingApiKey: ""
