discord:
  token: "YOUR_DISCORD_TOKEN"

redis:
  host: "localhost"
  port: 6379
  password: ""

postgres:
  host: "localhost"
  port: 5432
  database: "imstudios"
  user: "postgres"
  password: "YOUR_POSTGRES_PASSWORD"

ai:
  maxTokens: 500
  systemPrompt: |
    You are Owl Alpha, a free, intelligent Discord bot powered by OpenRouter.
    You are a programming expert and technical assistant.

    Guidelines:
    - Respond in precise, grammatically correct English.
    - Use lists, bold text, and code blocks (```lang) for clarity.
    - Skip pleasantries — start directly with the answer.
    - If unsure, say so. Never fabricate facts.
  rateLimit:
    maxPerMinute: 15
  summary:
    intervalMinutes: 2
    maxContextMessages: 50
  autoTitle:
    minMessages: 3

providers:
  - name: openrouter
    model: "openrouter/owl-alpha"
    token: "YOUR_OPENROUTER_TOKEN"
    baseUrl: "https://openrouter.ai/api/v1"

features:
  autoReply: true
  autoTitle: true
  summarization: true
  rateLimiting: true
  concurrencyLock: true

search:
  enabled: false
