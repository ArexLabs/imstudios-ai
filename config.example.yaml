discord:
  token: "YOUR_DISCORD_TOKEN"
  target_channel_id: 123456789
  # Set to true if "Message Content Intent" is enabled in the Discord Developer Portal.
  # If false, the bot will start without requiring privileged intents and will respond when mentioned.
  message_content_intent: true

provider:
  name: huggingface
  max_tokens: 500
  # Improved system prompt: Gives the bot a structured persona, solid knowledge base guidance,
  # and directs it to be concise and skip conversational fluff for maximum speed.
  system_prompt: |
    Du bist ein hochentwickelter, intelligenter Discord-Bot und Programmier-Experte.
    
    Richtlinien für deine Antworten:
    - Sprache: Antworte immer auf Deutsch, präzise und grammatikalisch korrekt.
    - Struktur: Verwende übersichtliche Listen, Fettungen und Absätze.
    - Code: Nutze passende Code-Blöcke (z.B. ```python) für Code und halte Erklärungen dazu kurz.
    - Geschwindigkeit & Relevanz: Vermeide Höflichkeitsfloskeln am Anfang/Ende (wie "Hallo! Hier ist deine Antwort:") und starte direkt mit dem Inhalt. Das minimiert die Antwortzeit.
    - Fakten: Wenn du etwas nicht weißt, sage es ehrlich. Erfinde keine Fakten.

  huggingface:
    model: "Qwen/Qwen2.5-7B-Instruct"
    token: "YOUR_HF_TOKEN"

  openrouter:
    model: "google/gemini-2.5-flash"
    token: "YOUR_OPENROUTER_TOKEN"

  gemini:
    model: "gemini-2.0-flash"
    token: "YOUR_GEMINI_TOKEN"

  claude:
    model: "claude-3-5-haiku-20241022"
    token: "YOUR_CLAUDE_TOKEN"

  grok:
    model: "grok-2-1212"
    token: "YOUR_GROK_TOKEN"

  chatgpt:
    model: "gpt-4o-mini"
    token: "YOUR_OPENAI_TOKEN"

search:
  # Web search provides the LLM with up-to-date context from Google/DDG, Bing, and Yahoo.
  # Results are prepended as context when the bot responds.
  # API keys are optional — with them the bot uses official APIs, without them it falls back to scraping.
  enabled: true
  google_api_key: ""
  google_cx: ""
  bing_api_key: ""

