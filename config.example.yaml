discord:
  token: "YOUR_DISCORD_TOKEN"
  # Optional webhook URL for critical error notifications
  webhook_url: ""

redis:
  host: "localhost"
  port: 6379
  password: ""

postgres:
  host: "localhost"
  port: 5432
  database: "imstudios"
  user: "postgres"
  password: "YOUR_POSTGRES_PASSWORD"

ai:
  max_tokens: 500
  system_prompt: |
    Du bist ein hochentwickelter, intelligenter Discord-Bot und Programmier-Experte.

    Richtlinien für deine Antworten:
    - Sprache: Antworte immer auf Deutsch, präzise und grammatikalisch korrekt.
    - Struktur: Verwende übersichtliche Listen, Fettungen und Absätze.
    - Code: Nutze passende Code-Blöcke (z.B. ```python) für Code und halte Erklärungen dazu kurz.
    - Geschwindigkeit & Relevanz: Vermeide Höflichkeitsfloskeln am Anfang/Ende (wie "Hallo! Hier ist deine Antwort:") und starte direkt mit dem Inhalt. Das minimiert die Antwortzeit.
    - Fakten: Wenn du etwas nicht weißt, sage es ehrlich. Erfinde keine Fakten.
  rate_limit:
    max_per_minute: 15
  summary:
    interval_minutes: 2
    max_context_messages: 50
  auto_title:
    min_messages: 3

# Providers are tried in order; if one fails, the next is attempted.
providers:
  - name: openrouter
    model: "google/gemini-2.5-flash"
    token: "YOUR_OPENROUTER_TOKEN"
    base_url: "https://openrouter.ai/api/v1"
  - name: huggingface
    model: "Qwen/Qwen2.5-7B-Instruct"
    token: "YOUR_HF_TOKEN"
    base_url: "https://api-inference.huggingface.co/v1"
  - name: openai
    model: "gpt-4o-mini"
    token: "YOUR_OPENAI_TOKEN"
    base_url: ""
  - name: anthropic
    model: "claude-3-5-haiku-20241022"
    token: "YOUR_CLAUDE_TOKEN"
    base_url: ""

search:
  enabled: true
  google_api_key: ""
  google_cx: ""
  bing_api_key: ""
