discord:
  token: "${DISCORD_TOKEN}"

redis:
  host: redis
  port: 6379

postgres:
  host: postgres
  port: 5432
  database: "${POSTGRES_DB}"
  user: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"

ai:
  maxTokens: 500
  systemPrompt: |
    You are an advanced, intelligent Discord bot and programming expert.

    Response guidelines:
    - Write clear, well-structured responses using bullet points and code blocks where appropriate.
    - Be concise — skip pleasantries and get straight to the content.
    - Use proper Markdown formatting (bold, lists, code blocks with language tags).
    - If you don't know something, say so honestly. Do not fabricate facts.
  rateLimit:
    maxPerMinute: 15
  summary:
    intervalMinutes: 2
    maxContextMessages: 50
  autoTitle:
    minMessages: 3

providers:
  - name: openrouter
    model: "${AI_MODEL}"
    token: "${AI_TOKEN}"
    baseUrl: "${AI_BASE_URL}"

features:
  autoReply: true
  autoTitle: true
  summarization: true
  rateLimiting: true
  concurrencyLock: true

search:
  enabled: false
