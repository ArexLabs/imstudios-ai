services:
  postgres:
    image: postgres:latest
    container_name: dc-ai-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - imstudios-net

  redis:
    image: redis:latest
    container_name: imstudios-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - imstudios-net

  discord-bot:
    build:
      context: .
      target: release
    container_name: imstudios-bot
    restart: unless-stopped
    init: true
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - imstudios-net

volumes:
  pgdata:

networks:
  imstudios-net:
    driver: bridge
