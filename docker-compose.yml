services:
  postgres:
    image: postgres:latest
    container_name: imstudios-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: imstudios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - imstudios-net

  redis:
    image: redis:latest
    container_name: imstudios-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - imstudios-net

  discord-bot:
    build:
      context: .
      target: release
    container_name: imstudios-bot
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - imstudios-net

volumes:
  pgdata:

networks:
  imstudios-net:
    driver: bridge
