name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]

jobs:
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun audit
        continue-on-error: true