name: Bug report
description: Report a bug to help improve the bot
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Before posting, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Send a message in channel X
        2. The bot responds with ...
        3. See error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs from the container or bot output.
      render: text

  - type: dropdown
    id: setup
    attributes:
      label: Deployment
      description: How are you running the bot?
      options:
        - Docker Compose (local)
        - Dokploy
        - Coolify
        - Bare metal (bun run)
        - Other
    validations:
      required: true

  - type: dropdown
    id: databases
    attributes:
      label: Databases
      description: Which databases are you using?
      multiple: true
      options:
        - PostgreSQL + Redis (full setup)
        - PostgreSQL only
        - Redis only
        - Neither (in-memory mode)

  - type: textarea
    id: config
    attributes:
      label: Config (redacted)
      description: |
        Paste your `config.yaml` with secrets redacted.
        This helps reproduce provider-specific issues.
      render: yaml

  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit SHA or tag
      placeholder: e.g. d2f6ab6
